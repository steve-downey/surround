# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files

  # Markdown linting
  # Config file: .markdownlint.yaml
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: ['--disable', 'MD013', ' --']
        exclude: ^papers/

  # Config file: .codespell_ignore
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ['-I', '.codespell_ignore', '--uri-ignore-words-list', '*']
        exclude: >
          (?x)^(
            (checkdoc-batch)/.*
          )$

  - repo: https://github.com/checkmake/checkmake.git
    # Or another commit hash or version
    rev: 0.2.2
    hooks:
      # Use this hook to let pre-commit build checkmake in its sandbox
      - id: checkmake
        exclude: ^checkdoc-batch/

  #  MBake Makefile formatting
  - repo: https://github.com/EbodShojaei/bake
    rev: v1.4.5
    hooks:
      # - id: mbake-format
      #   args: ["--config=.github/bake.toml"]
      - id: mbake-validate
